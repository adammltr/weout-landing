<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Microsoft Clarity tracking -->
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "v43ct04bg0");
    </script>

    <!-- SAFARI FIX: Force immediate color scheme to prevent FOUC -->
    <meta name="color-scheme" content="dark" />
    
    <!-- SAFARI FIX: Critical inline styles to prevent flash of wrong colors -->
    <style>
      html, body, #root {
        background-color: hsl(250 15% 6%);
        color: hsl(0 0% 98%);
      }
      /* Prevent invisible text while font loads (FOIT) */
      html {
        font-display: swap;
      }
    </style>
    
    <!-- SAFARI FIX: Preconnect to Google Fonts for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- SAFARI FIX: Direct stylesheet load with display=swap
         The media="print" hack causes FOIT on Safari because WebKit
         doesn't handle the media switch smoothly. Direct load with
         display=swap is safer and Google Fonts handles caching well. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />

    <title>WeOut — Sortir, rencontrer des amis et vivre la nightlife à Caen</title>
    <meta
      name="description"
      content="WeOut est l'app pour sortir en ville, rencontrer des amis et vivre la nightlife étudiante à Caen. Propose un plan, vois qui est dispo et rejoins des événements près de toi."
    />
    <meta
      name="keywords"
      content="sortir, going out, rencontrer des gens, meet people, nightlife, city nightlife, soirées étudiantes, events, événements, amis, friends, vie étudiante, student life, Caen"
    />
    <meta name="author" content="WeOut" />

    <meta
      property="og:title"
      content="WeOut — Sortir, rencontrer des amis et vivre la nightlife à Caen"
    />
    <meta
      property="og:description"
      content="Organise tes sorties, retrouve tes amis et découvre des événements étudiants à Caen avec WeOut."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@WeOutApp" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
